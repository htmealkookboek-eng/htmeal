services:
  - type: web
    name: htmeal-kookboek
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: RENDER
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: HTMEAL_ALLOW_LOCAL_SQLITE
        value: "false"
      - key: SUPABASE_URL
        value: "https://ctrlrgdvuqicwdakhtch.supabase.co"
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
    autoDeploy: true
